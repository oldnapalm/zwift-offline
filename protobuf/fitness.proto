syntax = "proto2";

message Fitness {
    optional int32 streak = 1;
    optional WeekMetrics this_week = 2;
    optional WeekMetrics last_week = 3;
    optional SportGoals goals = 4;
    optional int32 f5 = 5;
}

message WeekMetrics {
    optional string start = 1;
    optional float f2 = 2;
    optional int32 distance = 3;
    optional int32 f4 = 4;
    optional int32 f5 = 5;
    optional int32 work = 6;
    optional int32 calories = 7;
    optional float tss = 8;
    repeated DayMetrics days = 9;
}

message DayMetrics {
    optional string day = 1;
    optional int32 distance = 2;
    optional int32 f3 = 3;
    optional int32 f4 = 4;
    optional int32 work = 5;
    optional int32 calories = 6;
    optional float tss = 7;
    repeated PowerZonePercentages power_zones = 8;
}

message PowerZonePercentages {
    optional int32 zone = 1;
    optional float percentage = 2;
}

message SportGoals {
    optional GoalSetting goal_setting = 1;
    optional int32 f4 = 4;
    optional int64 last_updated = 5;
}

message GoalSetting {
    optional int32 f1 = 1;
    optional int32 f2 = 2;
    optional int32 f3 = 3;
}
